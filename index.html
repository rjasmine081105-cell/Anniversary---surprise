<!DOCTYPE html>
<html>
<head>
  <title>Our 2 Years 💖</title>

  <style>

    body{
      margin:0;
      background:#0f0f0f;
      overflow:hidden;
      font-family:Arial;
      color:white;
      text-align:center;
    }

    .container{
      padding-top:80px;
      position:relative;
      z-index:2;
    }

    h1{
      color:pink;
      font-size:50px;
    }

    .question-box{
      margin-top:40px;
    }

    button{
      padding:15px 25px;
      margin:10px;
      border:none;
      border-radius:30px;
      background:pink;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.1);
    }

    #result{
      margin-top:20px;
      font-size:28px;
      color:lightpink;
      animation:fade 0.5s;
    }

    #countdown{
      font-size:24px;
      margin-top:20px;
      color:white;
    }

    .heart{
      position:absolute;
      font-size:25px;
      animation:float linear infinite;
      opacity:0.8;
    }

    @keyframes float{
      from{
        transform:translateY(100vh);
      }

      to{
        transform:translateY(-120vh);
      }
    }

    @keyframes fade{
      from{
        opacity:0;
      }

      to{
        opacity:1;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <h1>How Well Do You Know Us? 💖</h1>

  <div id="countdown"></div>

  <div class="question-box">

    <h2>When did we first meet?</h2>

    <button onclick="checkAnswer('wrong')">
      June 12
    </button>

    <button onclick="checkAnswer('correct')">
      September 23
    </button>

    <button onclick="checkAnswer('wrong')">
      December 1
    </button>

  </div>

  <p id="result"></p>

</div>

<script>

function checkAnswer(answer){

  const result =
    document.getElementById("result");

  if(answer === "correct"){

    result.innerHTML =
      "Yayyy correct 💖";

  }

  else{

    result.innerHTML =
      "WRONG 😤 Study our relationship better.";

  }

}

const countdown =
  document.getElementById("countdown");

const anniversary =
  new Date("May 13, 2024 00:00:00").getTime();

setInterval(() => {

  const now = new Date().getTime();

  const distance =
    anniversary - now;

  const days =
    Math.floor(distance /
    (1000 * 60 * 60 * 24));

  const hours =
    Math.floor(
    (distance %
    (1000 * 60 * 60 * 24))
    /
    (1000 * 60 * 60)
    );

  countdown.innerHTML =
    "Countdown: "
    + days +
    " days "
    + hours +
    " hours";

},1000);

for(let i=0;i<40;i++){

  let heart =
    document.createElement("div");

  heart.classList.add("heart");

  heart.innerHTML = "💖";

  heart.style.left =
    Math.random()*100 + "vw";

  heart.style.animationDuration =
    Math.random()*4 + 3 + "s";

  document.body.appendChild(heart);

}

</script>

</body>
</html>
